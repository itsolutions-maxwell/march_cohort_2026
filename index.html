<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayFinder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">stayfinder</div>
        <nav class="topnav">
          <a href="#">Stays</a>
          <a href="#">Experiences</a>
          <a href="#">Online Experiences</a>
        </nav>
        <button class="host-btn">Become a host</button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <p class="hero-kicker">Plan your next getaway</p>
          <h1>Find unique places to stay</h1>
          <p class="hero-sub">Discover cabins, beach houses, city apartments, and more.</p>
        </div>
      </section>

      <section class="search-panel" aria-label="Search stays">
        <div class="search-grid">
          <label>
            <span>Where</span>
            <input id="where-input" type="text" placeholder="Search destinations" />
          </label>
          <label>
            <span>Check in</span>
            <input type="date" />
          </label>
          <label>
            <span>Check out</span>
            <input type="date" />
          </label>
          <label>
            <span>Guests</span>
            <input type="number" min="1" value="2" />
          </label>
          <button id="search-btn" class="search-btn">Search</button>
        </div>
      </section>

      <section class="listings" aria-label="Popular homes">
        <h2>Popular homes</h2>
        <div id="cards" class="cards"></div>
      </section>

      <section class="booking" aria-label="Selected listing booking">
        <h2>Listing details</h2>
        <article id="listing-detail" class="listing-detail" hidden>
          <div id="detail-image" class="listing-image image-one"></div>
          <div class="listing-content">
            <p id="detail-location" class="location"></p>
            <h3 id="detail-title"></h3>
            <p id="detail-meta" class="meta"></p>
            <p id="detail-price" class="price"></p>
          </div>
        </article>

        <h2>Book this listing</h2>
        <form id="booking-form" class="booking-form">
          <label>
            <span>Full name</span>
            <input id="user-name" type="text" required placeholder="Enter your name" />
          </label>
          <label>
            <span>Email</span>
            <input id="user-email" type="email" required placeholder="name@example.com" />
          </label>
          <label>
            <span>Check in</span>
            <input id="book-check-in" type="date" required />
          </label>
          <label>
            <span>Check out</span>
            <input id="book-check-out" type="date" required />
          </label>
          <label>
            <span>Guests</span>
            <input id="book-guests" type="number" min="1" value="2" required />
          </label>
          <button type="submit" class="search-btn">Confirm booking</button>
        </form>
      </section>

      <p id="message" class="message" aria-live="polite"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
